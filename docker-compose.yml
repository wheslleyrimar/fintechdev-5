services:
  rabbitmq:
    image: rabbitmq:3-management
    ports: ["5672:5672","15672:15672"]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ledger
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: postgres -c max_connections=200

  zipkin:
    image: openzipkin/zipkin:latest
    ports:
      - "9411:9411"

  jaeger:
    image: jaegertracing/all-in-one:1.55
    environment:
      # Sem isso o all-in-one pode não aceitar OTLP nas portas 4317/4318 (UI só mostra jaeger-all-in-one).
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    depends_on:
      - zipkin
      - jaeger

  prometheus:
    image: prom/prometheus
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
    ports: ["9090:9090"]

  grafana:
    image: grafana/grafana
    ports: ["3000:3000"]
    depends_on:
      - prometheus
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro

  payment-service:
    build: ./services/payment
    ports: ["8080:8080"]
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=payment
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - ZIPKIN_EXPORTER_ENDPOINT=http://zipkin:9411/api/v2/spans
      - ZIPKIN_EXPORTER_SECONDARY=http://otel-collector:9411/api/v2/spans
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      zipkin:
        condition: service_started
      otel-collector:
        condition: service_started

  ledger-service:
    build: ./services/ledger
    ports: ["8081:8081"]
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=ledger
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - ZIPKIN_EXPORTER_ENDPOINT=http://zipkin:9411/api/v2/spans
      - ZIPKIN_EXPORTER_SECONDARY=http://otel-collector:9411/api/v2/spans
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      zipkin:
        condition: service_started
      otel-collector:
        condition: service_started

  balance-service:
    build: ./services/balance
    environment:
      - RABBIT_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      rabbitmq:
        condition: service_healthy

  notification-service:
    build: ./services/notification
    ports: ["8082:8082"]
    environment:
      - RABBIT_URL=amqp://guest:guest@rabbitmq:5672/
      - PORT=8082
    depends_on:
      rabbitmq:
        condition: service_healthy

  antifraud-service:
    build: ./services/antifraud
    environment:
      - RABBIT_URL=amqp://guest:guest@rabbitmq:5672/
      - SERVICE_NAME=antifraud
    depends_on:
      rabbitmq:
        condition: service_healthy

volumes:
  postgres_data:
